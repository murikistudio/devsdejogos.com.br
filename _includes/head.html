<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Metadata -->
    <title>{{ page.title | default: site.title }} | {{ site.title }}</title>
    <meta property="og:title" content="{{ page.title | default: site.title }} | {{ site.title }}" />
    <meta property="og:description" content="{{ page.description | default: site.description }}" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{ site.siteurl }}" />
    <meta property="og:site_name" content="{{ site.baseurl }}" />
    <meta property="og:image" content="{{ site.baseurl }}/assets/img/{{ page.logo_share | default: 'logo-share.webp' }}" />
    <meta itemprop="name" content="{{ page.title | default: site.title }}">
    <meta name="description" content="{{ page.description | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
    <meta itemprop="description" content="{{ page.description | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ page.title | default: site.title }} | {{ site.title }}" />
    <meta name="twitter:description" content="{{ page.description | default: site.description | strip_html | strip_newlines | truncate: 160 }}" />
    <meta property="twitter:image" content="{{ site.baseurl }}/assets/img/{{ page.logo_share | default: 'logo-share.webp' }}" />

    <!-- Favicons -->
    <link rel="canonical" href="{{ site.siteurl }}" />
    <link rel="shortcut icon" type="image/x-icon" href="{{ site.baseurl }}/assets/favicons/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ site.baseurl }}/assets/favicons/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192"  href="{{ site.baseurl }}/assets/favicons/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ site.baseurl }}/assets/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ site.baseurl }}/assets/favicons/favicon-16x16.png">
    <link rel="manifest" href="{{ site.baseurl }}/assets/favicons/site.webmanifest">

    <!-- Other -->
    <link rel="me" href="https://mastodon.social/@murikistudio">

    <!-- Libraries -->
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css">

    <!-- Popper -->
    <script src="{{ site.baseurl }}/assets/libs/popper/popper.min.js"></script>

    <!-- Font Awesome -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/js/fontawesome.min.js" integrity="sha512-j12pXc2gXZL/JZw5Mhi6LC7lkiXL0e2h+9ZWpqhniz0DkDrO01VNlBrG3LkPBn6DgG2b8CDjzJT+lxfocsS1Vw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/js/solid.min.js" integrity="sha512-H/FYzgm63CLJLwSgCNv7zmAHWnbw7GwOrnCjE15CD969yHWj7fGDiHHLZuZJLO9ZGIkBR/JL91/p/ddbtUUgQQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/libs/bootstrap/bootstrap.min.css">
    <script src="{{ site.baseurl }}/assets/libs/bootstrap/bootstrap.min.js"></script>

    {% if page.swiper %}
    <!-- Swiper -->
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/libs/swiper/swiper-bundle.min.css" />
    <script src="{{ site.baseurl }}/assets/libs/swiper/swiper-bundle.min.js"></script>
    {% endif %}

    {% if page.jquery %}
    <!-- jQuery -->
    <script src="{{ site.baseurl }}/assets/libs/jquery/jquery.min.js"></script>
    {% endif %}

    {% if page.vue %}
    <!-- Vue -->
    <script src="{{ site.baseurl }}/assets/libs/vue/vue.global.prod.min.js"></script>
    {% endif %}

    <!-- Main -->
    <script src="{{ site.baseurl }}/assets/js/main.js"></script>
</head>
